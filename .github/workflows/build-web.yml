# .github/workflows/build-web.yml — Build Commet Web for rewr.ca
# Triggers on push to main or manual dispatch
# Outputs: web build artifact (commet-web) for download/deploy

name: Build Commet Web

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_PATH: commet

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'true'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.8.0
        with:
          flutter-version: '3.41.1'
          channel: 'stable'

      - name: Setup Tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev libmpv-dev mpv ffmpeg

      - name: Configure default homeserver
        run: |
          cat > $PROJECT_PATH/assets/config/global_config.json << 'EOF'
          {
            "default_homeserver": "matrix.rewr.ca"
          }
          EOF

      - name: Code Generation
        run: |
          cd $PROJECT_PATH
          dart run scripts/codegen.dart

      - name: Build Web
        run: |
          cd $PROJECT_PATH
          flutter build web --release \
            --dart-define PLATFORM=web \
            --dart-define BUILD_MODE=release \
            --dart-define GIT_HASH=${{ github.sha }} \
            --dart-define VERSION_TAG=${{ github.ref_name }} \
            --dart-define BUILD_DETAIL=rewr

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: commet-web
          path: ${{ env.PROJECT_PATH }}/build/web
          retention-days: 30
